name: Compile Markdown Posts

on:
  push:
    branches:
      - development
    paths:
      - 'markdown/posts/**'
      - 'markdown/pages/**'
      - 'scratch/build-posts.js'
      - 'package.json'

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Build posts and pages
        run: NODE_ENV=production npm run build

      - name: Commit and push changes
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add content/posts/*.html content/pages/*.html data/posts.json data/pages.json
          if git diff --cached --quiet; then
            echo "No changes to commit"
          else
            git commit -m "Auto-compile Markdown posts and pages [skip ci]"
            git push
          fi
