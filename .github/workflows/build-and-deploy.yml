name: Compile & Build Site

on:
  push:
    branches:
      - master
      - main
      - development
    paths:
      - 'markdown/**'
      - 'data/**'
      - 'scripts/**'
      - 'src/**'
      - 'package.json'

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install Dependencies
        run: npm install

      - name: Build site
        run: NODE_ENV=production npm run build

      - name: Commit and push changes
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add content/ posts/ pages/ media/ data/ feed.xml feed.json sitemap.xml TAGS.md index.html
          if git diff --cached --quiet; then
            echo "No changes to commit"
          else
            git commit -m "Auto-compile site assets and pages [skip ci]"
            git push
          fi

